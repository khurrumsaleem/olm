# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: 'true'
          clean: 'false'
          submodules: 'false'
      - name: Fetch test data submodule
        shell: bash
        run: |
          set -euo pipefail
          git lfs install --local

          for attempt in 1 2 3 4 5; do
            echo "Fetching data submodule, attempt ${attempt}/5"
            git submodule deinit -f data || true
            rm -rf .git/modules/data data
            git submodule sync -- data

            if git submodule update --init --depth=1 data && git -C data lfs pull; then
              git submodule status data
              exit 0
            fi

            echo "data submodule fetch failed"
            if [[ "${attempt}" != "5" ]]; then
              sleep $((attempt * 30))
            fi
          done

          echo "Unable to fetch data submodule after 5 attempts"
          exit 1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
          python -m pip install -e ".[test,docs,notebooks]"
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest and generate coverage
        run: |
          python -m pytest -n 3 --cov=scale --cov-report=xml --cov-report=term-missing .
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  test:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "All tests passed successfully"
            exit 0
          else
            echo "Tests failed"
            exit 1
          fi
